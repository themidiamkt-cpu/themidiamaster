<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The Midia Master | Sistema interno da The Midia Marketing">
  <meta name="supabase-url" content="https://wkjnxohfggqwhemalelf.supabase.co">
  <meta name="supabase-anon-key" content="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indram54b2hmZ2dxd2hlbWFsZWxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2OTI4ODUsImV4cCI6MjA5NjI2ODg4NX0.-JCIYS5e2D7OkUr5AmWnr0SEN0vT3GhPp-CXvRLVvAE">
  <meta name="theme-color" content="#0f172a">
  <title>The Midia Master</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">TM</div>
        <div>
          <strong>The Midia Master</strong>
          <span>Operacao da agencia</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="dashboard"><i data-lucide="layout-dashboard"></i>Dashboard</button>
        <button class="nav-item" data-view="dashboardClientes"><i data-lucide="chart-no-axes-combined"></i>Dashboard Clientes</button>
        <button class="nav-item" data-view="clientes"><i data-lucide="building-2"></i>Clientes</button>
        <button class="nav-item" data-view="relatorios"><i data-lucide="bar-chart-3"></i>Relatórios</button>
        <button class="nav-item" data-view="crm"><i data-lucide="kanban-square"></i>CRM Comercial</button>
        <button class="nav-item" data-view="metaAds"><i data-lucide="badge-dollar-sign"></i>Relatórios Meta Ads</button>
        <button class="nav-item" data-view="gbp"><i data-lucide="map-pinned"></i>GMN Análises</button>
        <button class="nav-item" data-view="diario"><i data-lucide="notebook-tabs"></i>Diário de Bordo</button>
        <button class="nav-item" data-view="tarefas"><i data-lucide="check-square"></i>Tarefas</button>
        <button class="nav-item" data-view="equipe"><i data-lucide="users"></i>Equipe</button>
        <button class="nav-item" data-view="metas"><i data-lucide="target"></i>Metas</button>
        <button class="nav-item" data-view="alertas" id="navAlertas"><i data-lucide="triangle-alert"></i>Alertas <span class="nav-badge" id="alertasBadge" hidden></span></button>
        <button class="nav-item" data-view="config"><i data-lucide="settings"></i>Configuracoes</button>
      </nav>

      <div class="sidebar-footer">
        <span>Sistema interno</span>
        <strong>The Midia Marketing</strong>
        <button class="ghost-button" id="logoutButton" style="width:100%; margin-top:12px;"><i data-lucide="log-out"></i>Sair</button>
      </div>
    </aside>

    <main class="main">
      <button class="mobile-toggle" id="mobileToggle" aria-label="Abrir menu"><i data-lucide="menu"></i></button>
      <div id="app"></div>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <section class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div>
          <p class="eyebrow" id="modalEyebrow">Registro</p>
          <h2 id="modalTitle">Formulario</h2>
        </div>
        <button class="icon-button" id="modalClose" aria-label="Fechar"><i data-lucide="x"></i></button>
      </div>
      <form id="modalForm" class="modal-body"></form>
    </section>
  </div>

  <div id="taskDetailOverlay" hidden></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
